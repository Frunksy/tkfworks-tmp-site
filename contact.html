<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact | TKF Works</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="wrap">
    <h1><a href="/" style="text-decoration:none;color:inherit;">TKF Works</a></h1>
    <nav>
      <a href="/">Bio</a>
      <a href="/services.html">Services</a>
      <a href="/contact.html" aria-current="page">Contact</a>
    </nav>
  </header>

  <main class="wrap">
  <h2>Contact</h2>

  <p class="hint">
    Australia-wide service. Remote support available, with on-site by arrangement.
  </p>

  <form method="POST" action="https://formspree.io/f/REPLACE_ME">
    <label>
      Name
      <input name="name" autocomplete="name" required />
    </label>

    <label>
      Email
      <input type="email" name="email" autocomplete="email" required />
    </label>

    <label>
      Company (optional)
      <input name="company" autocomplete="organization" />
    </label>

    <label>
      Message
      <textarea name="message" rows="6" required placeholder="What are you trying to improve? (Workflow / software / quoting & estimating SMP / leadership / safety talks)"></textarea>
    </label>

    <button type="submit">Send message</button>
  </form>

  <p class="hint">
    Prefer email? <a href="mailto:contact@tkfworks.com.au">contact@tkfworks.com.au</a>
  </p>
</main>
  <footer class="wrap footer">
    <small>© TKF Works</small>
  </footer>
</body>
</html>
