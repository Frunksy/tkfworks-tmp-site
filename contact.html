<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact | TKF Works</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="wrap">
    <h1><a href="/" style="text-decoration:none;color:inherit;">TKF Works</a></h1>
    <nav>
      <a href="/">Bio</a>
      <a href="/services.html">Services</a>
      <a href="/contact.html" aria-current="page">Contact</a>
    </nav>
  </header>

  <main class="wrap">
    <h2>Contact</h2>

    <p>Email: <a href="mailto:contact@tkfworks.com.au">contact@tkfworks.com.au</a></p>

    <h3>Send a message</h3>
    <!-- 1) Create a form endpoint with a form provider (e.g., Formspree)
         2) Replace the action URL below with your endpoint -->
    <form method="POST" action="https://formspree.io/f/REPLACE_ME">
      <label>
        Name<br />
        <input name="name" autocomplete="name" required />
      </label>

      <label>
        Email<br />
        <input type="email" name="email" autocomplete="email" required />
      </label>

      <label>
        Message<br />
        <textarea name="message" rows="6" required></textarea>
      </label>

      <button type="submit">Send</button>
    </form>

    <p class="hint">This form will send to your <code>contact@tkfworks.com.au</code> inbox once configured.</p>
  </main>

  <footer class="wrap footer">
    <small>© TKF Works</small>
  </footer>
</body>
</html>
